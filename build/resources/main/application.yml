server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: gateway-service

  config:
    import: optional:dotenv:.env[.properties]  # .env 파일 지원 (선택)

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            key-resolver: "#{@ipKeyResolver}"

        - name: AddResponseHeader
          args:
            name: X-Gateway
            value: HomePiter-GW

      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - name: CircuitBreaker
              args:
                name: userServiceFallback
                fallbackUri: forward:/fallback/user

        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**
          filters:
            - name: CircuitBreaker
              args:
                name: adminServiceFallback
                fallbackUri: forward:/fallback/admin

        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/**

        - id: business-service
          uri: lb://business-service
          predicates:
            - Path=/business/**

#  redis:
#    host: localhost
#    port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
